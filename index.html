<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        table{
            border-collapse: collapse;
            font-family: Khmer OS Battambang;
            background-color: rgb(255, 255, 255);
            margin-top: 20px;
            margin-left: 20px;
            margin-right: 20px;
            width: 80%;
            border: 2px solid black;
        }
        th{
            text-align: center;
            color: rgb(26, 2, 180);
            padding: 20px;
            border: 2px solid black;
            background-color: darkturquoise;
        }
        td{
            text-align: left;
            color: rgb(0, 0, 0);
            padding-left: 10px;
            padding-bottom: 10px;
            padding-right:10px ;
            padding-top:10px ;
            border: 2px solid black;
        }
        tr:hover{
                background-color: tomato;
                cursor: pointer;
        }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th rowspan="2">ល.ក</th>
        <th rowspan="2">ឈ្មោះរាជធានី ខេត្ត</th>
        <th colspan="2">ប្រជាពលរដ្ឋ១៨ ឆ្នាំឡើង</th>
      </tr>
      <tr>
        <th>សរុប</th>
        <th>ស្រី</th>
      </tr>
      <tr>
        <td>01</td>
        <td>បន្ទាយមានជ័យ</td>
        <td>546,229</td>
        <td>278,168</td>
      </tr>
      <tr>
        <td>02</td>
        <td>បាត់ដំបង</td>
        <td>848,034</td>
        <td>428,267</td>
      </tr>
      <tr>
        <td>03</td>
        <td>កំពង់ចាម</td>
        <td>795,046</td>
        <td>401,359</td>
      </tr>
    </table>
  </body>
</html>
